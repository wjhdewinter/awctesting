<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Lege Pallets AWC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>📦 Lege Pallets AWC</h1>

<div class="card">
  <h2>➕ Registreren</h2>

  <input type="number" id="aantal" placeholder="Aantal">
  
  <select id="type">
    <option>EPAL</option>
    <option>DPB</option>
    <option>Blok</option>
  </select>

  <select id="locatie">
    <option>Warehouse</option>
    <option>Dock 1</option>
    <option>Dock 2</option>
    <option>Zone A</option>
    <option>Zone B</option>
  </select>

  <button onclick="opslaan()">Opslaan</button>
</div>

<div class="card">
  <h2>📊 Dashboard</h2>
  <p>Totaal pallets: <span id="totaal">0</span></p>
  <p>EPAL: <span id="epal">0</span></p>
  <p>DPB: <span id="dpb">0</span></p>
</div>

<div class="card">
  <h2>📋 Overzicht</h2>
  <ul id="lijst"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
