<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AWC Warehouse Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {margin:0;font-family:Arial;background:#f4f4f4;}
header {background:#000;color:#fff;padding:20px;text-align:center;font-size:20px;}

nav {display:grid;grid-template-columns:repeat(3,1fr);}
nav button {
padding:18px;
font-size:18px;
border:none;
background:#111;
color:#fff;
}
nav button.active {background:#ff7a00;}

main {padding:15px;}

.card {
background:#fff;
padding:20px;
border-radius:12px;
margin-bottom:15px;
}

input,select,textarea {
width:100%;
padding:16px;
margin-top:8px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
}

button {
width:100%;
padding:18px;
margin-top:12px;
font-size:18px;
border:none;
border-radius:12px;
background:#000;
color:#fff;
}

button.orange {background:#ff7a00;}

.error {background:#ffe5e5;color:#b00000;padding:10px;margin-top:10px;display:none;}
.success {background:#e6ffe6;color:#006600;padding:10px;margin-top:10px;display:none;}

.check {display:flex;justify-content:space-between;margin-top:10px;}
</style>
</head>

<body>

<header>AWC Warehouse Tool</header>

<nav>
<button onclick="showTab('pallets')" class="active">Pallets</button>
<button onclick="showTab('checklist')">Machines</button>
<button onclick="showTab('incident')">Incident</button>
</nav>

<main>

<!-- PALLETS -->
<div id="pallets" class="card tab">
<h3>Pallet telling</h3>

<div class="error" id="errorPallet"></div>
<div class="success" id="successPallet">Opgeslagen ✔</div>

<select id="locatie">
<option>Conakryweg</option>
<option>Slego</option>
</select>

<input placeholder="Naam gebruiker" id="naam">

<label>Europallets</label>
<input type="number" id="euro" value="0">

<label>Blokpallets</label>
<input type="number" id="blok" value="0">

<label>2 meter pallets</label>
<input type="number" id="meter2" value="0">

<label>DPB pallets</label>
<input type="number" id="dpb" value="0">

<button class="orange" onclick="savePallet()">Opslaan</button>
<button onclick="exportExcel()">Export Excel</button>
<button onclick="emailPallet()">Mail</button>

<ul id="lijst"></ul>
</div>

<!-- CHECKLIST -->
<div id="checklist" class="card tab" style="display:none;">
<h3>Machine checklist</h3>

<div class="error" id="errorCheck"></div>
<div class="success" id="successCheck">Verzonden ✔</div>

<select id="machineType">
<option>Reachtruck</option>
<option>Pompkar</option>
</select>

<input placeholder="Gebruiker" id="gebruiker">
<input placeholder="Serienummer" id="serie">
<input placeholder="Machinenummer" id="machineNr">

<div class="check">Banden OK <input type="checkbox" id="c1"></div>
<div class="check">Remmen OK <input type="checkbox" id="c2"></div>
<div class="check">Hefmast OK <input type="checkbox" id="c3"></div>
<div class="check">Accu OK <input type="checkbox" id="c4"></div>

<textarea id="opmerking" placeholder="Opmerking"></textarea>

<button class="orange" onclick="saveCheck()">Opslaan</button>
<button onclick="mailCheck()">Mail</button>
</div>

<!-- INCIDENT -->
<div id="incident" class="card tab" style="display:none;">
<h3>Incident</h3>

<div class="error" id="errorIncident"></div>
<div class="success" id="successIncident">Verzonden ✔</div>

<input placeholder="Naam" id="incidentNaam">
<textarea id="incidentText" placeholder="Wat is er gebeurd?"></textarea>

<button class="orange" onclick="saveIncident()">Opslaan</button>
<button onclick="mailIncident()">Mail</button>
</div>

</main>

<script>

let data = JSON.parse(localStorage.getItem("pallets")) || [];

function showTab(tab){
document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
document.getElementById(tab).style.display="block";
}

function error(id,msg){
let e=document.getElementById(id);
e.innerText=msg;
e.style.display="block";
setTimeout(()=>e.style.display="none",3000);
}

function success(id){
let s=document.getElementById(id);
s.style.display="block";
setTimeout(()=>s.style.display="none",2000);
}

function savePallet(){
if(!naam.value){error("errorPallet","Vul naam in");return;}

let item={
loc:locatie.value,
naam:naam.value,
euro:+euro.value,
blok:+blok.value,
meter2:+meter2.value,
dpb:+dpb.value,
date:new Date().toLocaleString()
};

data.push(item);
localStorage.setItem("pallets",JSON.stringify(data));
success("successPallet");
render();
}

function render(){
let html="";
data.forEach(i=>{
html+=`<li>${i.date} ${i.loc} EU:${i.euro} BL:${i.blok} 2M:${i.meter2} DPB:${i.dpb}</li>`;
});
lijst.innerHTML=html;
}

function exportExcel(){
let ws = XLSX.utils.json_to_sheet(data);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Pallets");
XLSX.writeFile(wb, "pallets.xlsx");
}

function emailPallet(){
if(!data.length){error("errorPallet","Geen data");return;}

let last=data[data.length-1];

let body=`AWC Pallettelling

Datum: ${last.date}
Locatie: ${last.loc}
Naam: ${last.naam}

EU: ${last.euro}
BL: ${last.blok}
2M: ${last.meter2}
DPB: ${last.dpb}
`;

location.href="mailto:?subject=Pallet telling&body="+encodeURIComponent(body);
}

function saveCheck(){
if(!gebruiker.value){error("errorCheck","Vul gebruiker in");return;}
success("successCheck");
}

function mailCheck(){
location.href="mailto:?body=Machine check";
}

function saveIncident(){
if(!incidentNaam.value){error("errorIncident","Vul naam in");return;}
success("successIncident");
}

function mailIncident(){
location.href="mailto:?body="+incidentText.value;
}

render();

</script>

</body>
</html>
