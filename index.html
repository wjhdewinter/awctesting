<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWC Warehouse Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family:Arial;margin:0;background:#f4f4f4;}
header {background:#000;color:#fff;padding:18px;text-align:center;font-size:20px;}
nav {display:grid;grid-template-columns:repeat(3,1fr);}
nav button {
padding:18px;
font-size:18px;
border:none;
background:#000;
color:#fff;
}
nav button.active {background:#ff7a00;}

main {padding:15px;}

.card {
background:#fff;
padding:20px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,select,textarea {
width:100%;
padding:16px;
font-size:16px;
margin-top:8px;
border-radius:10px;
border:1px solid #ccc;
}

button {
margin-top:12px;
padding:18px;
font-size:18px;
border:none;
border-radius:12px;
background:#000;
color:#fff;
}

button.orange {background:#ff7a00;}

.error {
background:#ffe5e5;
color:#b00000;
padding:12px;
margin-top:10px;
border-radius:8px;
display:none;
}

.success {
background:#e6ffe6;
color:#006600;
padding:12px;
margin-top:10px;
border-radius:8px;
display:none;
}

.check {
display:flex;
justify-content:space-between;
align-items:center;
font-size:16px;
padding:10px 0;
}

</style>
</head>

<body>

<header>AWC Warehouse Tool</header>

<nav>
<button onclick="showTab('pallets')" class="active">Pallets</button>
<button onclick="showTab('checklist')">Machines</button>
<button onclick="showTab('incident')">Incident</button>
</nav>

<main>

<!-- PALLETS -->
<div id="pallets" class="tab card">
<h3>Pallet telling</h3>

<div class="error" id="errorPallet"></div>
<div class="success" id="successPallet">Opgeslagen ✔</div>

<select id="locatie">
<option>Conakryweg</option>
<option>Slego</option>
</select>

<label>Europallets</label>
<input type="number" id="euro" value="0">

<label>Blokpallets</label>
<input type="number" id="blok" value="0">

<label>2 meter pallets</label>
<input type="number" id="meter2" value="0">

<label>DPB pallets</label>
<input type="number" id="dpb" value="0">

<input placeholder="Naam gebruiker" id="naam">

<button class="orange" onclick="savePallet()">Opslaan</button>
<button onclick="exportExcel()">Export Excel</button>

<ul id="lijst"></ul>
</div>

<!-- CHECKLIST -->
<div id="checklist" class="tab card" style="display:none;">
<h3>Machine checklist</h3>

<div class="error" id="errorCheck"></div>
<div class="success" id="successCheck">Verzonden ✔</div>

<select id="machineType">
<option>Reachtruck</option>
<option>Pompkar</option>
</select>

<input placeholder="Gebruiker" id="gebruiker">
<input placeholder="Serienummer" id="serie">
<input placeholder="Machinenummer" id="machineNr">

<h4>Controlepunten</h4>

<div class="check">Banden OK <input type="checkbox" id="c1"></div>
<div class="check">Remmen OK <input type="checkbox" id="c2"></div>
<div class="check">Hefmast OK <input type="checkbox" id="c3"></div>
<div class="check">Accu OK <input type="checkbox" id="c4"></div>
<div class="check">Geen lekken <input type="checkbox" id="c5"></div>
<div class="check">Veiligheid OK <input type="checkbox" id="c6"></div>

<textarea id="opmerking" placeholder="Probleem / defect"></textarea>
<input type="file" id="fotoCheck">

<button class="orange" onclick="validateChecklist()">Verzenden</button>
</div>

<!-- INCIDENT -->
<div id="incident" class="tab card" style="display:none;">
<h3>Incident melding</h3>

<div class="error" id="errorIncident"></div>
<div class="success" id="successIncident">Verzonden ✔</div>

<input placeholder="Naam melder" id="incidentNaam">

<select id="incidentLocatie">
<option>Conakryweg</option>
<option>Slego</option>
</select>

<textarea id="incidentWat" placeholder="Wat is er gebeurd?"></textarea>
<textarea id="incidentWaarom" placeholder="Oorzaak"></textarea>
<textarea id="incidentSchade" placeholder="Schade / letsel"></textarea>

<input type="file" id="incidentFoto">

<button class="orange" onclick="validateIncident()">Verzenden</button>
</div>

</main>

<script>

let data = JSON.parse(localStorage.getItem("pallets")) || [];

function showTab(tab){
document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
document.getElementById(tab).style.display="block";
}

function showError(id,msg){
let el=document.getElementById(id);
el.innerText=msg;
el.style.display="block";
setTimeout(()=>el.style.display="none",3000);
}

function showSuccess(id){
let el=document.getElementById(id);
el.style.display="block";
setTimeout(()=>el.style.display="none",2000);
}

function savePallet(){
if(!naam.value){
showError("errorPallet","Vul naam in");
return;
}

let item={
loc:locatie.value,
euro:+euro.value,
blok:+blok.value,
meter2:+meter2.value,
dpb:+dpb.value,
naam:naam.value,
date:new Date().toLocaleString()
};

data.push(item);
localStorage.setItem("pallets",JSON.stringify(data));

showSuccess("successPallet");
render();
}

function render(){
let html="";
data.forEach(i=>{
html+=`<li>${i.date} ${i.loc} EU:${i.euro} BL:${i.blok} DPB:${i.dpb}</li>`;
});
lijst.innerHTML=html;
}

function exportExcel(){
let ws = XLSX.utils.json_to_sheet(data);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Pallets");
XLSX.writeFile(wb, "pallets.xlsx");
}

function validateChecklist(){
if(!gebruiker.value || !serie.value){
showError("errorCheck","Vul alle velden in");
return;
}
showSuccess("successCheck");
}

function validateIncident(){
if(!incidentNaam.value || !incidentWat.value){
showError("errorIncident","Vul verplichte velden in");
return;
}
showSuccess("successIncident");
}

render();

</script>

</body>
</html>
