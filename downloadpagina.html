<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWC Tool App</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #111827);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 18px;
}

.card {
  background: #111827;
  padding: 28px;
  border-radius: 22px;
  max-width: 560px;
  width: 100%;
  box-shadow: 0 20px 55px rgba(0,0,0,0.55);
  text-align: center;
}

.logo {
  width: 220px;
  max-width: 85%;
  margin-bottom: 18px;
  filter: drop-shadow(0 0 12px rgba(255,255,255,0.2));
}

h1 {
  margin: 10px 0;
  font-size: 30px;
}

.subtitle {
  color: #f97316;
  font-weight: bold;
  margin-bottom: 18px;
}

p {
  color: #cbd5e1;
  line-height: 1.6;
}

select {
  padding: 10px;
  border-radius: 10px;
  margin: 15px 0;
  font-size: 15px;
}

.btn {
  display: block;
  text-decoration: none;
  padding: 16px;
  border-radius: 14px;
  margin: 12px 0;
  font-weight: bold;
  font-size: 16px;
}

.web {
  background: #f97316;
  color: white;
}

.apk {
  background: #1f2937;
  color: #38bdf8;
  border: 1px solid #334155;
}

.features {
  margin-top: 22px;
  text-align: left;
  font-size: 15px;
  background: #0f172a;
  padding: 16px;
  border-radius: 14px;
}

.features div {
  margin-bottom: 9px;
}

.note {
  margin-top: 20px;
  background: #022c22;
  padding: 14px;
  border-radius: 12px;
  font-size: 14px;
  color: #4ade80;
  line-height: 1.5;
}

.contact {
  margin-top: 24px;
  font-size: 13px;
  color: #94a3b8;
  line-height: 1.7;
}

.footer {
  margin-top: 18px;
  color: #64748b;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="card">

<!-- WITTE LOGO -->
<img class="logo" src="awc_logo_white.png" alt="AWC Logo">

<h1>🚀 AWC Tool App</h1>
<div class="subtitle" id="subtitle"></div>

<select onchange="setLang(this.value)">
  <option value="nl">🇳🇱 Nederlands</option>
  <option value="en">🇬🇧 English</option>
  <option value="ua">🇺🇦 Українська</option>
  <option value="pl">🇵🇱 Polski</option>
  <option value="hu">🇭🇺 Magyar</option>
  <option value="ro">🇷🇴 Română</option>
  <option value="de">🇩🇪 Deutsch</option>
  <option value="es">🇪🇸 Español</option>
</select>

<p id="intro"></p>

<a class="btn web" href="https://wjhdewinter.github.io/AWC-final-1.0/" target="_blank">
🌐 Open webapp
</a>

<a class="btn apk" href="https://github.com/wjhdewinter/AWC-final-1.0/releases/download/V1.0/AWC.Tool.apk">
📦 Download Android app
</a>

<div class="features" id="features"></div>

<div class="note" id="note"></div>

<div class="contact">
📍 Slego 1a, 1046 BM Amsterdam<br>
📍 Conakryweg 6, 1047 HS Amsterdam<br>
📧 info@amsterdamwarehouse.com<br>
📞 +31 (0)20-3081287
</div>

<div class="footer">
AWC Tool App – Snel. Overzichtelijk. Betrouwbaar.
</div>

</div>

<script>
const translations = {
nl: {
subtitle:"Slimmer werken in het warehouse",
intro:"Welkom bij de AWC Tool App. Werk sneller, overzichtelijker en professioneler. Voer checks uit, registreer personeel en leg alles direct vast.",
features:[
"✔ Warehouse checks per ruimte",
"✔ Personeelsregistratie",
"✔ BHV controles",
"✔ Foto’s toevoegen",
"✔ PDF genereren & verzenden"
],
note:"Download de APK en sta 'onbekende apps' toe indien nodig."
},
en: {
subtitle:"Smarter warehouse work",
intro:"Welcome to the AWC Tool App. Work faster and more professional. Perform checks, register staff and capture everything instantly.",
features:[
"✔ Warehouse checks",
"✔ Staff registration",
"✔ Safety checks",
"✔ Add photos",
"✔ Generate PDFs"
],
note:"Download APK and allow unknown sources if needed."
}
};

function setLang(lang){
let t = translations[lang] || translations["nl"];
document.getElementById("subtitle").innerText = t.subtitle;
document.getElementById("intro").innerText = t.intro;

let html="";
t.features.forEach(f => html += "<div>"+f+"</div>");
document.getElementById("features").innerHTML = html;
document.getElementById("note").innerText = t.note;
}

setLang("nl");
</script>

</body>
</html>
