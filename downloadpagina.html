  padding: 16px;

}

.apk {

  color: #38bdf8;

  font-size: 15px;
  background: #0f172a;
  padding: 16px;
  border-radius: 14px;

  document.getElementById("subtitle").innerText = translations[lang].subtitle;
  document.getElementById("intro").innerText = translations[lang].intro;

  document.getElementById("note").innerText = translations[lang].note;
}
