<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWC Tool App</title>

<style>
:root{
  --bg:#0b1220;
  --card:#111827;
  --card2:#0f172a;
  --text:#ffffff;
  --muted:#cbd5e1;
  --orange:#f97316;
  --blue:#38bdf8;
  --green:#4ade80;
  --border:#334155;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#0b1220,#111827);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}

.card{
  width:100%;
  max-width:620px;
  background:linear-gradient(180deg,#111827,#0f172a);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:28px;
  box-shadow:0 24px 70px rgba(0,0,0,0.55);
  padding:28px;
  text-align:center;
}

.logo{
  width:240px;
  max-width:85%;
  margin:0 auto 22px;
  display:block;
  filter:drop-shadow(0 0 12px rgba(255,255,255,0.18));
}

h1{
  margin:8px 0;
  font-size:34px;
  line-height:1.15;
}

.subtitle{
  color:var(--orange);
  font-weight:800;
  font-size:19px;
  margin:10px 0 18px;
}

.lang-wrap{
  margin:18px 0 24px;
}

select{
  padding:13px 18px;
  border-radius:18px;
  font-size:18px;
  border:3px solid #f59e0b;
  background:white;
  color:#111827;
  min-width:260px;
  max-width:100%;
}

.intro{
  color:var(--muted);
  font-size:18px;
  line-height:1.7;
  margin:20px auto 26px;
  max-width:520px;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  width:100%;
  text-decoration:none;
  padding:19px 18px;
  border-radius:20px;
  margin:14px 0;
  font-weight:800;
  font-size:20px;
}

.web{
  background:var(--orange);
  color:white;
  box-shadow:0 10px 28px rgba(249,115,22,0.35);
}

.apk{
  background:#1f2937;
  color:var(--blue);
  border:1px solid var(--border);
}

.features{
  margin-top:26px;
  text-align:left;
  background:rgba(15,23,42,0.86);
  border:1px solid rgba(255,255,255,0.08);
  padding:18px;
  border-radius:18px;
  color:white;
}

.features h2{
  margin:0 0 14px;
  font-size:20px;
  color:white;
}

.features div{
  margin:11px 0;
  font-size:17px;
  line-height:1.4;
}

.note{
  margin-top:20px;
  background:#022c22;
  color:var(--green);
  border:1px solid rgba(74,222,128,0.25);
  padding:15px;
  border-radius:16px;
  font-size:15px;
  line-height:1.55;
}

.contact{
  margin-top:24px;
  font-size:14px;
  color:#94a3b8;
  line-height:1.75;
}

.footer{
  margin-top:20px;
  color:#64748b;
  font-size:14px;
}

@media(max-width:520px){
  .card{padding:22px 18px;border-radius:24px}
  h1{font-size:30px}
  .subtitle{font-size:18px}
  .intro{font-size:17px}
  .btn{font-size:18px}
  .logo{width:220px}
}
</style>
</head>

  <div class="subtitle" id="subtitle"></div>

  <div class="lang-wrap">

      <option value="bg">🇧🇬 Български</option>
      <option value="ro">🇷🇴 Română</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="es">🇪🇸 Español</option>
    </select>
  </div>

  <p class="intro" id="intro"></p>

  <a class="btn web" id="webBtn" href="https://wjhdewinter.github.io/AWC-final-1.0/" target="_blank" rel="noopener"></a>

  <a class="btn apk" id="apkBtn" href="https://github.com/wjhdewinter/AWC-final-1.0/releases/download/V1.0/AWC.Tool.apk"></a>

  <section class="features">

    <div id="featuresList"></div>
  </section>

  <div class="note" id="note"></div>

  <div class="contact">
    📍 Slego 1a, 1046 BM Amsterdam<br>
    📍 Conakryweg 6, 1047 HS Amsterdam<br>
    📧 info@amsterdamwarehouse.com<br>
    📞 +31 (0)20-3081287
  </div>

  <div class="footer" id="footer"></div>

</main>

function setLang(lang){
  const t = translations[lang] || translations.nl;

  document.documentElement.lang = lang;
  document.getElementById("title").innerText = t.title;
  document.getElementById("subtitle").innerText = t.subtitle;
  document.getElementById("intro").innerText = t.intro;
  document.getElementById("webBtn").innerText = t.web;
  document.getElementById("apkBtn").innerText = t.apk;
  document.getElementById("featuresTitle").innerText = t.featuresTitle;
  document.getElementById("featuresList").innerHTML = t.features.map(item => "<div>" + item + "</div>").join("");
  document.getElementById("note").innerText = t.note;
  document.getElementById("footer").innerText = t.footer;
}
